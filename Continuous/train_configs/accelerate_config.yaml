compute_environment: LOCAL_MACHINE
debug: false                                                                                               
deepspeed_config:
  gradient_accumulation_steps: 2
  gradient_clipping: 1.0
  offload_optimizer_device: none
  offload_param_device: none
  zero3_init_flag: false
  zero_stage: 2
distributed_type: DEEPSPEED
downcast_bf16: 'no'
enable_cpu_affinity: false
machine_rank: 0
main_training_function: main
mixed_precision: 'bf16'
num_machines: 1
num_processes: 4
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false

# Note: To specify which GPUs to use, set CUDA_VISIBLE_DEVICES in the launch script
# Example: export CUDA_VISIBLE_DEVICES=0,1,2,3  (use GPUs 0,1,2,3)
# Then set num_processes to match the number of GPUs (e.g., 4 for the example above)